<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作战中心 - 奥迪 A5L 数字化门户</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { 
            --primary: #0a9dd8; 
            --bg: #111111; 
            --glass: rgba(22, 22, 24, 0.9);
            --border: rgba(10, 157, 216, 0.4);
        }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        body { 
            background: var(--bg); color: #e2e8f0; 
            font-family: 'Inter', 'PingFang SC', sans-serif; 
            min-height: 100vh; overflow-y: auto; overflow-x: hidden;
            font-size: 32px; /* 字号翻倍 */
        }
        .grid-bg { 
            position: fixed; inset: 0;
            background-image: radial-gradient(rgba(10, 157, 216, 0.15) 3px, transparent 3px); 
            background-size: 80px 80px; z-index: 0; pointer-events: none;
        }
        .glass-panel { 
            background: var(--glass); border: 3px solid var(--border); 
            backdrop-filter: blur(50px); position: relative; box-shadow: 0 20px 80px rgba(0,0,0,0.9);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-panel::after {
            content: ""; position: absolute; top: -3px; left: -3px; width: 50px; height: 50px;
            border-top: 6px solid var(--primary); border-left: 6px solid var(--primary);
            filter: drop-shadow(0 0 20px var(--primary)); border-radius: 12px 0 0 0;
        }
        .node-active { 
            border-color: var(--primary); background: rgba(10, 157, 216, 0.25); 
            box-shadow: 0 0 40px rgba(10, 157, 216, 0.4); transform: scale(1.05);
        }
        .glow-text { text-shadow: 0 0 40px rgba(10, 157, 216, 0.9); }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 40px; }
        [x-cloak] { display: none !important; }
        .back-btn:hover { background: rgba(10, 157, 216, 0.15); color: #0a9dd8; }
    </style>
</head>
<body x-data="taskManager()" x-init="init()" class="flex flex-col min-h-screen select-none relative">

    <div class="grid-bg"></div>

    <!-- 顶栏 (Sticky) -->
    <header class="h-32 bg-black/70 border-b-2 border-white/10 flex items-center justify-between px-20 z-50 backdrop-blur-3xl sticky top-0 shrink-0">
        <div class="flex items-center space-x-12">
            <img src="logo.png" alt="A5L LOGO" class="h-20 w-auto object-contain filter brightness-150">
            <div class="h-16 w-1 bg-white/20 mx-4"></div>
            <button onclick="window.history.back()" class="flex items-center px-12 py-5 rounded-[40px] border-2 border-white/15 text-2xl text-gray-400 font-black uppercase tracking-widest hover:text-[#0a9dd8] hover:border-[#0a9dd8] transition-all">
                <svg class="w-10 h-10 mr-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                返回作战门户
            </button>
            <h1 class="text-3xl font-black tracking-[0.4em] text-[#0a9dd8] glow-text uppercase ml-12">奥迪 A5L 双车上市激活作战矩阵</h1>
        </div>
        <div class="flex items-center space-x-16">
            <div class="flex flex-col items-end">
                <span class="text-lg uppercase tracking-widest mb-1 opacity-50">一汽奥迪线索</span>
                <span class="text-white font-black text-4xl leading-none">10,500</span>
            </div>
            <div class="w-0.5 h-16 bg-white/10"></div>
            <div class="flex flex-col items-end">
                <span class="text-lg uppercase tracking-widest mb-1 opacity-50">上汽奥迪线索</span>
                <span class="text-white font-black text-4xl leading-none">9,800</span>
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden p-16 gap-16 z-10">
        
        <!-- 左侧：战区压力 -->
        <aside class="w-[40rem] flex flex-col gap-12">
            <div class="glass-panel p-16 bg-black/40 flex flex-col gap-12">
                 <div class="flex justify-between items-center border-l-4 border-[#0a9dd8] pl-8">
                      <span class="text-2xl font-black text-white uppercase tracking-[0.3em] italic">核心渠道吞吐量</span>
                      <span class="text-xl px-6 py-2 bg-green-500/10 text-green-500 border-2 border-green-500/30 font-black rounded-full animate-pulse">LIVE_AUDIT</span>
                 </div>
                 <div class="grid grid-cols-2 gap-10">
                      <div class="p-10 bg-white/5 border-2 border-white/10 rounded-[50px] flex flex-col gap-6 group hover:bg-white/10 transition-all">
                           <span class="text-xl text-gray-600 font-bold uppercase tracking-widest group-hover:text-gray-400">汽车之家 (FAW)</span>
                           <span class="text-5xl text-white font-black glow-text">6,201</span>
                      </div>
                      <div class="p-10 bg-white/5 border-2 border-white/10 rounded-[50px] flex flex-col gap-6 group hover:bg-white/10 transition-all">
                           <span class="text-xl text-gray-600 font-bold uppercase tracking-widest group-hover:text-gray-400">懂车帝 (SAIC)</span>
                           <span class="text-5xl text-white font-black glow-text">5,433</span>
                      </div>
                 </div>
            </div>

            <!-- 执行策略 -->
            <div class="flex-1 glass-panel p-16 bg-black/20 overflow-hidden flex flex-col border-dashed">
                 <div class="text-2xl font-black text-gray-500 uppercase tracking-widest border-b-2 border-white/10 pb-10 mb-12 italic">案例核心执行策略 (VGC_REINFORCED)</div>
                 <div class="flex-1 overflow-y-auto custom-scroll pr-8 space-y-12">
                      <template x-for="strategy in strategies" :key="strategy.title">
                           <div class="p-10 bg-black/50 border-2 border-white/10 rounded-[60px] hover:border-[#0a9dd866] hover:bg-black/80 transition-all group">
                                <div class="flex items-center space-x-10 mb-10">
                                     <div class="w-20 h-20 bg-[#0a9dd815] border-2 border-[#0a9dd844] rounded-[30px] flex items-center justify-center text-[#0a9dd8] group-hover:scale-110 transition-transform" x-html="strategy.icon"></div>
                                     <span class="text-3xl font-black text-white uppercase tracking-[0.2em] group-hover:text-[#0a9dd8]" x-text="strategy.title"></span>
                                </div>
                                <p class="text-2xl text-gray-500 font-bold leading-relaxed mb-10 group-hover:text-gray-300" x-text="strategy.desc"></p>
                                <div class="flex justify-between items-center text-xl font-black uppercase tracking-widest">
                                    <span class="text-gray-700">战术部署</span>
                                    <div class="flex items-center gap-4">
                                        <div class="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_15px_#22c55e]"></div>
                                        <span class="text-green-500">READY</span>
                                    </div>
                                </div>
                           </div>
                      </template>
                 </div>
            </div>
        </aside>

        <!-- 主内容：节点矩阵 -->
        <main class="flex-1 glass-panel flex flex-col overflow-hidden bg-[#11111166]">
             <div class="p-16 border-b-2 border-white/10 flex justify-between items-center bg-black/30">
                  <div class="flex items-center space-x-16">
                       <h2 class="text-4xl font-black text-white tracking-[0.3em] uppercase glow-text">A5L 线索实时清洗节点 (20,300 NODES)</h2>
                       <div class="flex gap-10">
                            <span class="px-10 py-4 bg-green-500/10 border-2 border-green-500/30 text-green-500 text-xl font-black rounded-full shadow-2xl">激活流水: 1,675</span>
                       </div>
                  </div>
             </div>

             <div class="flex-1 p-16 overflow-y-auto custom-scroll bg-[#11111144]">
                  <div class="grid grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-8">
                       <template x-for="(node, index) in nodes" :key="node.id">
                            <div @click="selectNode(node)" 
                                 :class="node.status === 'ACTIVE' ? 'node-active' : ''" 
                                 class="aspect-square glass-panel flex flex-col items-center justify-center group cursor-pointer hover:border-[#0a9dd8] hover:bg-[#0a9dd815] transition-all border-dashed rounded-[40px]">
                                 <div class="w-4 h-4 rounded-full mb-6 animate-pulse" 
                                      :class="node.status === 'IDLE' ? 'bg-gray-800' : (node.status === 'ACTIVE' ? 'bg-[#0a9dd8] shadow-[0_0_20px_#0a9dd8]' : 'bg-green-600')"></div>
                                 <span class="text-lg font-mono text-gray-700 group-hover:text-[#0a9dd8] transition-colors" x-text="node.id"></span>
                            </div>
                       </template>
                  </div>
                  
                  <div class="mt-32 p-32 glass-panel bg-black/80 border-dashed border-white/10 flex items-center justify-center italic text-gray-800 font-extrabold uppercase tracking-[1em] text-3xl">... 剩余节点载入中 ...</div>
             </div>
        </main>
    </div>

    <!-- 弹窗：节点详情 -->
    <div x-show="showDetail" x-cloak 
         class="fixed inset-0 z-[200] bg-black/95 flex items-center justify-center p-32 backdrop-blur-[60px]"
         x-transition:enter="transition ease-out duration-400"
         x-transition:enter-start="opacity-0 scale-90"
         x-transition:enter-end="opacity-100 scale-100">
         
         <div class="w-full max-w-7xl glass-panel bg-[#111111f2] flex flex-col shadow-[0_0_150px_rgba(0,0,0,1)] overflow-hidden rounded-[80px]" @click.away="showDetail = false">
              <div class="p-20 border-b-2 border-white/10 flex justify-between items-center bg-black/50">
                   <div class="flex flex-col gap-6">
                        <h3 class="text-6xl font-black text-white tracking-[0.4em] uppercase glow-text">线索画像深度解析</h3>
                        <div class="flex items-center gap-12">
                            <span class="text-2xl text-gray-500 font-mono" x-text="`CASE: ${activeNode.id}`"></span>
                            <span class="text-2xl text-[#0a9dd8] font-black uppercase tracking-widest" x-text="`BRAND: ${activeNode.brand}`"></span>
                        </div>
                   </div>
                   <button @click="showDetail = false" class="text-gray-500 hover:text-white transition-all transform hover:rotate-90">
                       <svg class="w-20 h-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                   </button>
              </div>

              <div class="p-24 grid grid-cols-2 gap-24 bg-[#11111188]">
                   <div class="space-y-16">
                        <div class="flex flex-col gap-10">
                             <label class="text-xl text-blue-900 font-black uppercase tracking-[0.4em] pl-8 border-l-4 border-[#0a9dd8]">AI 战败真实原因识别 (VOC_NLP)</label>
                             <div class="p-16 bg-[#0a9dd80c] border-2 border-[#0a9dd822] rounded-[60px] italic text-4xl text-gray-300 leading-relaxed shadow-inner" x-text="activeNode.reason"></div>
                        </div>
                        <div class="flex flex-col gap-10">
                             <label class="text-xl text-gray-700 font-black uppercase tracking-[0.4em] pl-8 border-l-4 border-gray-800">音色克隆状态</label>
                             <div class="px-12 py-8 bg-black/40 border-2 border-white/5 rounded-[40px] flex items-center justify-between">
                                  <span class="text-2xl text-white font-black uppercase">奥迪品牌专家官方克隆音色</span>
                                  <span class="text-green-500 text-xl font-black uppercase border-2 border-green-500/30 px-8 py-3 rounded-full">ENCRYPTED_READY</span>
                             </div>
                        </div>
                   </div>
                   
                   <div class="bg-black/60 p-20 rounded-[80px] border-2 border-white/10 flex flex-col gap-16 shadow-2xl">
                        <span class="text-xl text-gray-600 font-black uppercase tracking-[0.4em] italic">同步画像矩阵 (A5L_SPEC)</span>
                        <div class="space-y-10">
                             <template x-for="tag in activeNode.tags" :key="tag.label">
                                  <div class="flex justify-between items-center pb-8 border-b-2 border-white/5 group transition-all">
                                       <span class="text-2xl text-gray-500 uppercase tracking-widest group-hover:text-gray-300" x-text="tag.label"></span>
                                       <span class="text-3xl text-white font-black uppercase group-hover:text-[#0a9dd8]" x-text="tag.val"></span>
                                  </div>
                             </template>
                        </div>
                        
                        <div class="mt-auto flex gap-12 pt-12">
                             <button @click="notify('画像已同步至 CRM 路由中台。', 'success')" class="flex-1 py-10 bg-[#0a9dd8] text-white text-2xl font-black rounded-[40px] shadow-[0_20px_40px_rgba(10,157,216,0.3)] uppercase tracking-widest hover:scale-105 active:scale-95 transition-all">推送至中台</button>
                             <button @click="notify('已转接品牌专家。', 'info')" class="flex-1 py-10 bg-white/5 border-2 border-white/10 text-gray-500 text-2xl font-black rounded-[40px] uppercase hover:text-white transition-all">转接专家</button>
                        </div>
                   </div>
              </div>
         </div>
    </div>

    <!-- 全局提示器 -->
    <div id="os-notif" class="fixed bottom-12 right-12 z-[300] flex flex-col items-end gap-10 px-10 pointer-events-none"></div>

    <script>
        function taskManager() {
            return {
                showDetail: false,
                activeNode: { tags: [] },
                strategies: [
                    { title: '官方调研破冰', desc: '采用“奥迪中国官方回访”身份，利用 1:1 音色克隆消除客户防备，有效挖掘深层战败动机。', icon: '<svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>' },
                    { title: '动态变量追问', desc: '根据对话动态识别置换需求、车型偏好及决策周期，实现百万级并发下的精准标签化。', icon: '<svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>' }
                ],
                nodes: [],
                init() {
                    const brands = ['一汽奥迪 A5L', '上汽奥迪 A5L'];
                    for(let i=1; i<=32; i++) {
                        this.nodes.push({
                            id: `ID_${(Math.random()*10000).toFixed(0)}`,
                            status: i < 3 ? 'ACTIVE' : (i < 10 ? 'COMPLETE' : 'IDLE'),
                            brand: brands[i % 2],
                            reason: '用户深度对比[小米 SU7]，对奥迪[内饰智能化]有观望情绪，但在得知搭载华为 ADS 3.0 后意向度大幅回升。',
                            tags: [
                                { label: '意向分级', val: 'H 级 (High)' },
                                { label: '关注点', val: '华为 ADS 3.0' },
                                { label: '成交概率', val: '85%' }
                            ]
                        });
                    }
                    this.notify('A5L 作战节点矩阵已就绪。', 'success');
                },
                selectNode(node) {
                    this.activeNode = node;
                    this.showDetail = true;
                },
                notify(msg, type = 'info') {
                    const container = document.getElementById('os-notif');
                    const el = document.createElement('div');
                    const colors = { info: 'border-[#0a9dd8] text-[#0a9dd8]', success: 'border-green-500 text-green-500' };
                    el.className = `p-12 px-24 glass-panel text-2xl font-black ${colors[type]} transition-all duration-1000 translate-x-40 opacity-0 bg-black/95 shadow-2xl pointer-events-auto rounded-[60px]`;
                    el.innerHTML = `<span class="opacity-30 mr-8">[作战系统]</span> ${msg}`;
                    container.appendChild(el);
                    setTimeout(() => el.classList.remove('translate-x-40', 'opacity-0'), 20);
                    setTimeout(() => { el.classList.add('translate-x-40', 'opacity-0'); setTimeout(() => el.remove(), 1000); }, 5000);
                }
            }
        }
    </script>
</body>
</html>
